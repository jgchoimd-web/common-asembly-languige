name: Documentation issue
description: Report confusing, missing, or outdated documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
      placeholder: README.md, csrc/README.md, docs/index.html
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is confusing or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording
      description: Optional replacement text or outline.
